<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #011015;
        }

        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            width: 200px;
            height: 200px;
            border: 4px solid #011015;
            border-radius: 50%;
            position: absolute;
        }

        .ring:nth-child(1) {
            border-bottom-width: 8px;
            border-color: rgb(255, 0, 255);
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg);
            }

            100% {}
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>
</body>

</html>
