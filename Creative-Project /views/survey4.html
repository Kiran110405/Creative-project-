<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Q4</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #0E0F13;
            color: #E5E7EB;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 90%;
            max-width: 600px;
            background: #1A1F2B;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        .question {
            color: #9CA3AF;
            margin-bottom: 30px;
        }

        /* slider styling */
        .slider-container {
            margin: 30px 0;
        }

        input[type="range"] {
            width: 100%;
            appearance: none;
            height: 8px;
            background: #2A2F3C;
            border-radius: 10px;
            outline: none;
        }

        /* slider thumb */
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: #00F5FF;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.6);
        }

        /* labels */
        .labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #9CA3AF;
            margin-top: 8px;
        }

        .feedback {
            margin-top: 20px;
            font-size: 1rem;
            color: #00F5FF;
        }

        button {
            margin-top: 25px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #00F5FF;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        .gif-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 180px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Notification Behaviour</h1>
        <p class="question">How quickly do you check notifications?</p>

        <div class="gif-container">
            <img id="gif" src="/images/notification-ignore.gif" alt="notification gif">
        </div>
        <form id="form">


            <div class="slider-container">
                <input type="range" min="0" max="3" value="1" id="slider">
                <div class="labels">
                    <span>Rarely</span>
                    <span>Sometimes</span>
                    <span>Quickly</span>
                    <span>Instantly</span>
                </div>
            </div>

            <div class="feedback" id="feedback">
                You sometimes check notifications
            </div>

            <button type="submit">Save Answer</button>
        </form>
    </div>

    <script>
        const slider = document.getElementById("slider");
        const gif = document.getElementById("gif");
        const feedback = document.getElementById("feedback");
        const form = document.getElementById("form");

        //so the gif changes when the slider moves
        slider.addEventListener("input", () => {
            const value = slider.value;

            if (value == 0) {
                gif.src = "/images/notification-ignore.gif";
            }
            else if (value == 1) {
                gif.src = "/images/glitch-fast.gif";
            }
            else if (value == 2) {
                gif.src = "/images/phone-scrolling.gif";
            }
            else if (value == 3) {
                gif.src = "/images/text-scrolling.gif";
            }
        })

        let selectedValue = slider.value;

        // update text when slider moves
        function updateFeedback(value) {
            if (value == 0) {
                feedback.textContent = "You rarely check notifications";
            } else if (value == 1) {
                feedback.textContent = "You check notifications occasionally";
            } else if (value == 2) {
                feedback.textContent = "You check notifications quite quickly";
            } else if (value == 3) {
                feedback.textContent = "You check notifications instantly";
            }
        }

        slider.addEventListener("input", () => {
            selectedValue = slider.value;
            updateFeedback(selectedValue);
        });

        // save answer
        form.addEventListener("submit", (e) => {
            e.preventDefault();

            localStorage.setItem("q4_notification_score", selectedValue);
            localStorage.setItem("q4_notification_answer", feedback.textContent);

            feedback.textContent = "Answer saved!";
        });
    </script>

</body>

</html>
