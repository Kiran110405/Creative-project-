<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="survey5.css">
    <title>Document</title>
</head>

<body>
    <div class="grid-overlay"></div>
    <h1 class="app-title">DIGITAL DOPPELGANGER</h1>

    <div class="box">
        <div class="progress-area">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 100%;"></div>
            </div>
        </div>
        <h1>Awareness Check</h1>
        <p class="question">How aware are you of the digital footprint that you leave behind online?</p>

        <form id="form">
            <div class="images">
                <img id="digital-footprint-image" src="Assets/digitalfootprint.jpg" alt="Awareness image" width="200px"
                    height="200px">
            </div>
            <div class="slider-wrap">
                <input type="range" id="awarenessSlider" min="0" max="3" value="0">
                <div class="labels">
                    <span>Not aware</span>
                    <span>Somewhat aware</span>
                    <span>Mostly aware</span>
                    <span>Very aware</span>
                </div>
            </div>

            <div class="feedback" id="feedback">Not aware at all</div>

            <button type="submit">View Your Results!</button>
        </form>
    </div>

    <script>
        const slider = document.getElementById("awarenessSlider");
        const image = document.getElementById("digital-footprint-image");
        const feedback = document.getElementById("feedback");
        const form = document.getElementById("form");

        //images blurryness will update to these based on input given  and the answer text below
        function updateAwareness(value) {
            const blurLevels = ["12px", "8px", "4px", "0px"];
            const labels = [
                "Not aware at all",
                "Somewhat aware",
                "Mostly aware",
                "Very aware",
            ];

            //changes images blurryness based on feedback given
            image.style.filter = `blur(${blurLevels[value]})`;
            feedback.textContent = labels[value];
        }

        //this gets the input from the slider and passes it to the updateAwareness function.
        slider.addEventListener("input", () => {
            updateAwareness(slider.value);
        });

        form.addEventListener("submit", (event) => {
            event.preventDefault();

            const score = Number(slider.value);
            const labels = [
                "Not ware at all",
                "Somewhat aware",
                "Mostly aware",
                "Very aware",
            ];

            localStorage.setItem("q5_awareness_score", score);
            localStorage.setItem("q5_awareness_answer", labels[score])

            let totalScore = 0;//variable that holds all the scores combined

            //this part gets the scores from each sectoin
            totalScore += parseInt(localStorage.getItem("q1_posting_score")) || 0;
            totalScore += parseInt(localStorage.getItem("q2_score")) || 0;
            totalScore += parseInt(localStorage.getItem("q3_score")) || 0;
            totalScore += parseInt(localStorage.getItem("q4_score")) || 0;
            totalScore += parseInt(localStorage.getItem("q5_awareness_score")) || 0;

            if (totalScore <= 30) {
                localStorage.setItem("digitalResult", "healthy");
            }
            else if (totalScore <= 60) {
                localStorage.setItem("digitalResult", "balanced");
            }
            else {
                localStorage.setItem("digitalResult", "high");
            }

            window.location.href = "/scan";


        });

        updateAwareness(slider.value);



    </script>
</body>

</html>
